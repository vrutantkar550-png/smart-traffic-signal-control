# ml/data/processed/traffic.yaml
#
# YOLOv8 dataset configuration file.
# Points to your image/label folders and defines class names.
#
# Dataset layout:
#   ml/data/processed/
#       images/
#           train/   ← training images (.jpg)
#           val/     ← validation images (.jpg)
#       labels/
#           train/   ← YOLO .txt labels (one per image, same filename)
#           val/     ← YOLO .txt labels
#
# Label format (one line per object):
#   class_id  cx  cy  width  height
#   (all values 0.0–1.0, relative to image dimensions)
#
# Example label line for a car centered at (0.5, 0.6), 0.2w x 0.15h:
#   0 0.5 0.6 0.2 0.15

path: .                               # dataset root (relative to this file)
train: images/train
val:   images/val
test:  images/val                     # optional test split

# Number of classes
nc: 8

# Class names (must match label file class IDs 0–7)
names:
  0: car
  1: truck
  2: bus
  3: van
  4: motorcycle
  5: bicycle
  6: auto-rickshaw
  7: emergency_vehicle

# ── Notes on data collection ───────────────────────────────────────────────
#
# Recommended dataset size: 3000–5000 images per class for good performance.
#
# Free datasets you can use / merge:
#   - COCO (has car, truck, bus, motorcycle, bicycle)          → cocodataset.org
#   - UA-DETRAC (traffic surveillance from overhead cameras)   → detrac.org
#   - Indian Driving Dataset (IDD) for auto-rickshaw class     → idd.insaan.iiit.ac.in
#   - CARLA simulator screenshots for synthetic emergency data
#
# Convert COCO annotations to YOLO format:
#   pip install labelme2yolo  OR  use Roboflow (free online conversion)
